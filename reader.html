<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Article reader — Learnano">
  <title>Reader — Learnano</title>
  <link rel="icon" href="learnano_icon.ico" sizes="any">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>
<body data-page="reader">

<div id="app">
  <main class="page-wrapper">
    <div class="container" style="max-width:720px">

      <div class="viewer-breadcrumb" style="margin-bottom:1rem">
        <a href="articles.html" id="reader-back-link" data-i18n="reader.backToArticles">&#8592; Back to Articles</a>
      </div>

      <h1 id="reader-title" class="viewer-title"></h1>

      <div id="reader-content" class="viewer-content"><div class="loading-spinner"></div></div>

      <div class="reader-footer" style="margin-top:2rem;display:flex;justify-content:center">
        <div id="reader-action"></div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<script>
const Reader = {
  _articleId: null,
  _article: null,

  init() {
    const p = new URLSearchParams(window.location.search);
    this._articleId = p.get('article');
    if (!this._articleId) {
      this._showError('Missing article parameter.');
      return;
    }
    this._loadArticle();
  },

  async _loadArticle() {
    try {
      const articles = await Loader.loadJSON('https://raw.githubusercontent.com/AbdelkaderHazerchi/Learnano/refs/heads/main/data/articles.json');
      this._article = articles.find(a => a.id === this._articleId);
      if (!this._article) throw new Error(`Article "${this._articleId}" not found`);
      this._render();
    } catch (err) {
      console.error(err);
      this._showError(`Failed to load article "${this._articleId}".`);
    }
  },

  _render() {
    const article = this._article;
    const lang = App._state.lang;
    const title = article.title[lang] || article.title.en;
    const md = article.content[lang] || article.content.en;

    document.getElementById('reader-title').textContent = title;

    const container = document.getElementById('reader-content');
    let html = '';
    if (typeof marked !== 'undefined') {
      html = marked.parse(md);
    } else {
      html = `<pre>${md}</pre>`;
    }
    container.innerHTML = html;

    if (typeof Prism !== 'undefined') {
      container.querySelectorAll('pre code').forEach(b => Prism.highlightElement(b));
    }
    if (typeof renderMathInElement !== 'undefined') {
      renderMathInElement(container, { throwOnError: false });
    }

    this._renderAction();
    window.scrollTo(0, 0);
  },

  _renderAction() {
    const footer = document.getElementById('reader-action');
    if (!footer) return;
    const completed = State.isArticleCompleted(this._articleId);

    if (completed) {
      footer.innerHTML = `<button class="btn btn-success" disabled>${App.t('viewer.completed')}</button>`;
    } else {
      footer.innerHTML = `<button class="btn btn-primary" id="btn-complete-article">${App.t('reader.markComplete')}</button>`;
      document.getElementById('btn-complete-article').addEventListener('click', () => this._handleComplete());
    }
  },

  _handleComplete() {
    if (!this._article) return;
    State.completeArticle(this._articleId, this._article.points);
    this._renderAction();
    App.showToast(`+${this._article.points} ${App.t('toast.pointsEarned')}`, 'success');
  },

  _showError(msg) {
    const c = document.getElementById('reader-content');
    if (c) c.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>${msg}</p></div>`;
  }
};

document.addEventListener('DOMContentLoaded', () => Reader.init());
</script>

<script src="js/core.js"></script>
<script src="js/loader.js"></script>
<script src="js/app.js"></script>

</body>
</html>
