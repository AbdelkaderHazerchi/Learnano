<!DOCTYPE html>
<html lang="en" data-theme="system">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse informative articles.">
  <title>Articles — Learnano</title>
  <link rel="icon" href="learnano_icon.ico" sizes="any">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body data-page="articles">

<div id="app">
  <main class="page-wrapper">
    <div class="container">

      <h1 class="section-title" data-i18n="articles.title">Articles</h1>
      <div id="articles-grid" class="card-grid">
        <div class="loading-spinner"></div>
      </div>

    </div>
  </main>
</div>

<script>
async function PageInit() {
  const grid = document.getElementById('articles-grid');
  if (!grid) return;

  try {
    const articles = await Loader.loadJSON('https://raw.githubusercontent.com/AbdelkaderHazerchi/Learnano/refs/heads/main/data/articles.json');

    grid.innerHTML = '';

    if (articles.length === 0) {
      grid.innerHTML = '<div class="empty-state"><p>No articles available yet.</p></div>';
      return;
    }

    articles.forEach((article, i) => {
      const lang = App._state.lang;
      const title = article.title[lang] || article.title.en;
      const summary = article.summary[lang] || article.summary.en;
      const completed = State.isArticleCompleted(article.id);

      const card = document.createElement('div');
      card.className = 'card animate-slide-up';
      card.style.animationDelay = `${i * 0.1}s`;
      card.innerHTML = `
        <div class="card-body">
          <div class="course-card-icon">📄</div>
          <h3>${title}</h3>
          <p style="color:var(--text-secondary);font-size:0.9rem;line-height:1.5">${summary}</p>
          <div class="course-card-meta">
            <span>⭐ ${article.points} ${App.t('courses.points')}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.75rem">
            <span></span>
            <a href="reader.html?article=${article.id}" class="btn btn-sm ${completed ? 'btn-success' : 'btn-primary'}">
              ${completed ? App.t('viewer.completed') : App.t('articles.read')}
            </a>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  } catch (err) {
    console.error(err);
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>Failed to load articles.</p></div>';
  }
}
</script>

<script src="js/core.js"></script>
<script src="js/loader.js"></script>
<script src="js/app.js"></script>

</body>
</html>
